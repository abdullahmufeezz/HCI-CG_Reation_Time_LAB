<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reaction Time Lab</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Reaction Time Lab</h1>
  
  <div id="startScreen">
    <h2>Press SPACE to Start</h2>
    <p>Press A for Letters | L for Numbers</p>
    <p>You have 5 wrong attempts</p>
  </div>

  <div class="box" id="stimulus">?</div>

  <!-- STATUS -->
  <p id="status">Waiting to start...</p>
  <p>Wrong Attempts Left: <span id="lives">5</span></p>

  <h3>Stats</h3>
  <p>Trials: <span id="trials">0</span></p>
  <p>Correct: <span id="correct">0</span></p>
  <p>Average Reaction Time: <span id="avg">0</span> ms</p>

  <script src="script.js"></script>
</body>
</html>
