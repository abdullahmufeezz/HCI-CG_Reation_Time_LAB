<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reaction Time Lab</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Reaction Time Lab</h1>

  <div class="box" id="stimulus">?</div>

  <p>Press A for Letter | Press L for Number</p>
  <p>Press Space to Reset</p>

  <h3>Stats</h3>
  <p>Trials: <span id="trials">0</span></p>
  <p>Correct: <span id="correct">0</span></p>
  <p>Average Reaction Time: <span id="avg">0</span> ms</p>

  <script src="script.js"></script>
</body>
</html>
